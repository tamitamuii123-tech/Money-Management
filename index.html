<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Management App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        }

        .card-title {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
        }

        .income {
            border-left: 5px solid #10b981;
        }

        .income .card-value {
            color: #10b981;
        }

        .expense {
            border-left: 5px solid #ef4444;
        }

        .expense .card-value {
            color: #ef4444;
        }

        .balance {
            border-left: 5px solid #667eea;
        }

        .balance .card-value {
            color: #667eea;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1rem;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            font-weight: 500;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-delete {
            background: #ef4444;
            color: white;
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .transactions-list {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .transactions-list h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
            transition: background 0.3s;
            flex-wrap: wrap;
            gap: 10px;
        }

        .transaction-item:hover {
            background: #f9fafb;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-info {
            flex: 1;
            min-width: 150px;
        }

        .transaction-description {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .transaction-category {
            font-size: 0.9rem;
            color: #999;
        }

        .transaction-amount {
            font-size: 1.1rem;
            font-weight: bold;
            min-width: 120px;
            text-align: right;
        }

        .income-amount {
            color: #10b981;
        }

        .expense-amount {
            color: #ef4444;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .chart-container h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .category-item:last-child {
            border-bottom: none;
        }

        .category-bar {
            background: #667eea;
            height: 30px;
            border-radius: 5px;
            min-width: 50px;
            margin-left: 15px;
            transition: background 0.3s;
        }

        .success-msg {
            background: #d1fae5;
            color: #065f46;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #10b981;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .tabs {
                gap: 5px;
            }

            .tab-btn {
                padding: 10px 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Money Manager</h1>
            <p>Kelola keuangan Anda dengan mudah</p>
        </div>

        <div class="dashboard">
            <div class="card income">
                <div class="card-title">Total Pendapatan</div>
                <div class="card-value" id="totalIncome">Rp 0</div>
            </div>
            <div class="card expense">
                <div class="card-title">Total Pengeluaran</div>
                <div class="card-value" id="totalExpense">Rp 0</div>
            </div>
            <div class="card balance">
                <div class="card-title">Saldo</div>
                <div class="card-value" id="totalBalance">Rp 0</div>
            </div>
            <div class="card">
                <div class="card-title">Total Transaksi</div>
                <div class="card-value" id="totalTransactions">0</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="switchTab('add')">➕ Tambah</button>
            <button class="tab-btn" onclick="switchTab('history')">📜 Riwayat</button>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboard" class="tab-content active">
            <div class="chart-container">
                <h3>📊 Pengeluaran per Kategori</h3>
                <div id="categoryChart">
                    <div class="empty-state">
                        <p>Belum ada pengeluaran</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Transaction Tab -->
        <div id="add" class="tab-content">
            <div class="form-section">
                <h2>Tambah Transaksi Baru</h2>
                <div id="successMsg"></div>
                <form onsubmit="addTransaction(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Tipe Transaksi</label>
                            <select id="transactionType" onchange="updateCategories()">
                                <option value="income">📥 Pendapatan</option>
                                <option value="expense">📤 Pengeluaran</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Kategori</label>
                            <select id="category">
                                <option value="Salary">Salary</option>
                                <option value="Bonus">Bonus</option>
                                <option value="Investment">Investment</option>
                                <option value="Freelance">Freelance</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Jumlah (Rp)</label>
                            <input type="number" id="amount" placeholder="0" step="1000" required>
                        </div>
                        <div class="form-group">
                            <label>Tanggal</label>
                            <input type="date" id="transactionDate" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Deskripsi</label>
                        <input type="text" id="description" placeholder="Contoh: Gaji bulan Maret" required>
                    </div>

                    <button type="submit" class="btn btn-primary">✅ Simpan Transaksi</button>
                </form>
            </div>
        </div>

        <!-- History Tab -->
        <div id="history" class="tab-content">
            <div class="transactions-list">
                <h3>📝 Riwayat Transaksi</h3>
                <div id="transactionsList">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>Belum ada transaksi</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize date input with today's date
        document.getElementById('transactionDate').valueAsDate = new Date();

        // Income and Expense Categories
        const incomeCategories = ['Salary', 'Bonus', 'Investment', 'Freelance', 'Other'];
        const expenseCategories = ['Food', 'Transport', 'Utilities', 'Entertainment', 'Shopping', 'Healthcare', 'Education', 'Other'];

        // Load transactions from localStorage
        let transactions = JSON.parse(localStorage.getItem('moneyTransactions')) || [];

        // Format currency
        function formatCurrency(amount) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(amount);
        }

        // Format date
        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('id-ID', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        // Update categories based on transaction type
        function updateCategories() {
            const type = document.getElementById('transactionType').value;
            const categories = type === 'income' ? incomeCategories : expenseCategories;
            const categorySelect = document.getElementById('category');
            categorySelect.innerHTML = categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
        }

        // Switch tabs
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            // Refresh UI
            updateUI();
        }

        // Add transaction
        function addTransaction(event) {
            event.preventDefault();

            const transaction = {
                id: Date.now(),
                type: document.getElementById('transactionType').value,
                amount: parseFloat(document.getElementById('amount').value),
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                date: document.getElementById('transactionDate').value
            };

            transactions.unshift(transaction);
            localStorage.setItem('moneyTransactions', JSON.stringify(transactions));

            // Show success message
            const successMsg = document.getElementById('successMsg');
            successMsg.innerHTML = '<div class="success-msg">✅ Transaksi berhasil disimpan!</div>';
            setTimeout(() => {
                successMsg.innerHTML = '';
            }, 3000);

            // Reset form
            event.target.reset();
            document.getElementById('transactionDate').valueAsDate = new Date();

            updateUI();
        }

        // Delete transaction
        function deleteTransaction(id) {
            if (confirm('Yakin ingin menghapus transaksi ini?')) {
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('moneyTransactions', JSON.stringify(transactions));
                updateUI();
            }
        }

        // Calculate stats
        function calculateStats() {
            const income = transactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);
            const expense = transactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);
            return {
                income,
                expense,
                balance: income - expense
            };
        }

        // Get category breakdown
        function getCategoryBreakdown() {
            const breakdown = {};
            transactions
                .filter(t => t.type === 'expense')
                .forEach(t => {
                    breakdown[t.category] = (breakdown[t.category] || 0) + t.amount;
                });
            return breakdown;
        }

        // Update UI
        function updateUI() {
            // Update stats
            const stats = calculateStats();
            document.getElementById('totalIncome').textContent = formatCurrency(stats.income);
            document.getElementById('totalExpense').textContent = formatCurrency(stats.expense);
            document.getElementById('totalBalance').textContent = formatCurrency(stats.balance);
            document.getElementById('totalTransactions').textContent = transactions.length;

            // Update category chart
            updateCategoryChart();

            // Update transactions list
            updateTransactionsList();
        }

        // Update category chart
        function updateCategoryChart() {
            const breakdown = getCategoryBreakdown();
            const maxValue = Math.max(...Object.values(breakdown), 1);

            if (Object.keys(breakdown).length === 0) {
                document.getElementById('categoryChart').innerHTML = `
                    <div class="empty-state">
                        <p>Belum ada pengeluaran</p>
                    </div>
                `;
                return;
            }

            const html = Object.entries(breakdown)
                .sort((a, b) => b[1] - a[1])
                .map(([category, amount]) => {
                    const percentage = (amount / maxValue) * 100;
                    return `
                        <div class="category-item">
                            <div style="flex: 1;">
                                <div style="font-weight: 600; color: #333;">${category}</div>
                                <div style="color: #999; font-size: 0.9rem;">${formatCurrency(amount)}</div>
                            </div>
                            <div class="category-bar" style="width: ${percentage}%; min-width: ${Math.max(50, percentage)}px;"></div>
                        </div>
                    `;
                })
                .join('');

            document.getElementById('categoryChart').innerHTML = html;
        }

        // Update transactions list
        function updateTransactionsList() {
            if (transactions.length === 0) {
                document.getElementById('transactionsList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>Belum ada transaksi</p>
                    </div>
                `;
                return;
            }

            const html = transactions
                .map(t => `
                    <div class="transaction-item">
                        <div class="transaction-info">
                            <div class="transaction-description">
                                ${t.type === 'income' ? '📥' : '📤'} ${t.description}
                            </div>
                            <div class="transaction-category">
                                ${t.category} • ${formatDate(t.date)}
                            </div>
                        </div>
                        <div class="transaction-amount ${t.type === 'income' ? 'income-amount' : 'expense-amount'}">
                            ${t.type === 'income' ? '+' : '-'} ${formatCurrency(t.amount)}
                        </div>
                        <button class="btn btn-delete" onclick="deleteTransaction(${t.id})">🗑️ Hapus</button>
                    </div>
                `)
                .join('');

            document.getElementById('transactionsList').innerHTML = html;
        }

        // Initial UI update
        updateUI();
    </script>
</body>
</html>
